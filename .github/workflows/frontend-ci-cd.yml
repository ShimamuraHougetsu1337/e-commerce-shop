name: 🚀 Frontend CI/CD → Vercel

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci-cd.yml"

jobs:
  # ─── Job 1: CI - Lint & Build ────────────────────────────────────
  ci:
    name: ✅ Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🏗️ Build
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: https://mock-backend.onrender.com
          NEXTAUTH_URL: https://mock-frontend.vercel.app
          NEXTAUTH_SECRET: mock_nextauth_secret_value
          GITHUB_ID: mock_github_id_value
          GITHUB_SECRET: mock_github_secret_value
          GOOGLE_ID: mock_google_id_value
          GOOGLE_SECRET: mock_google_secret_value

